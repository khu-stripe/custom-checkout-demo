<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --violet-deep: #1a0a2e;
      --violet-bright: #6c3ce0;
      --violet-glow: #a78bfa;
      --gold: #f4c542;
      --gold-soft: #fde68a;
      --text-primary: #faf7f2;
      --text-muted: #b8a9d4;
      --surface: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.08);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--violet-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(108, 60, 224, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3.5rem 3rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.6s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }

    .status-icon.success {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-soft) 100%);
    }

    .status-icon.pending {
      background: linear-gradient(135deg, var(--violet-bright) 0%, var(--violet-glow) 100%);
    }

    .status-icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--violet-deep);
      stroke-width: 3;
      fill: none;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .details {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      text-align: left;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      font-size: 0.88rem;
    }

    .detail-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .detail-label { color: var(--text-muted); }

    .detail-value {
      font-weight: 500;
      color: var(--text-primary);
    }

    .detail-value.currency {
      text-transform: uppercase;
      color: var(--gold);
    }

    .detail-value.active { color: #4ade80; }

    .back-link {
      display: inline-block;
      color: var(--violet-glow);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="card">
    <div class="status-icon success" id="status-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 id="title">Welcome aboard</h1>
    <p class="subtitle" id="subtitle">Loading session details...</p>
    <div class="details" id="details" style="display: none;"></div>
    <a href="/" class="back-link">Back to demo</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session_id");

    function formatCurrency(amount, currency) {
      try {
        return (amount / 100).toLocaleString("en-US", {
          style: "currency",
          currency: currency.toUpperCase(),
        });
      } catch {
        return `${(amount / 100).toFixed(2)} ${currency.toUpperCase()}`;
      }
    }

    if (sessionId) {
      fetch(`/session-status?session_id=${sessionId}`)
        .then((r) => r.json())
        .then((data) => {
          if (data.error) {
            document.getElementById("subtitle").textContent =
              "Could not load session details.";
            return;
          }

          const isComplete = data.status === "complete";

          document.getElementById("title").textContent = isComplete
            ? "Welcome aboard"
            : "Session open";

          document.getElementById("subtitle").textContent = isComplete
            ? "Your Mindvalley Membership subscription is now active."
            : "The checkout session is still open. Payment may be pending.";

          if (!isComplete) {
            const icon = document.getElementById("status-icon");
            icon.classList.remove("success");
            icon.classList.add("pending");
          }

          const details = document.getElementById("details");
          details.style.display = "block";

          let rows = [];

          if (data.customerEmail) {
            rows.push(["Email", data.customerEmail]);
          }

          if (data.currency && data.amountTotal != null) {
            rows.push([
              "Amount",
              `<span class="detail-value currency">${formatCurrency(data.amountTotal, data.currency)}</span>`,
            ]);
          }

          if (
            data.presentmentDetails &&
            data.presentmentDetails.presentment_currency &&
            data.presentmentDetails.presentment_currency !== data.currency
          ) {
            const pc = data.presentmentDetails.presentment_currency;
            const pa = data.presentmentDetails.presentment_amount;
            if (pa != null) {
              rows.push([
                "Customer paid",
                `<span class="detail-value currency">${formatCurrency(pa, pc)}</span>`,
              ]);
            }
          }

          if (data.subscriptionId) {
            rows.push(["Subscription", data.subscriptionId]);
            rows.push([
              "Status",
              `<span class="detail-value active">${data.subscriptionStatus || "active"}</span>`,
            ]);
          } else {
            rows.push([
              "Payment",
              `<span class="detail-value active">${data.paymentStatus || data.status}</span>`,
            ]);
          }

          details.innerHTML = rows
            .map(
              ([label, value]) =>
                `<div class="detail-row"><span class="detail-label">${label}</span>${
                  value.startsWith("<")
                    ? value
                    : `<span class="detail-value">${value}</span>`
                }</div>`
            )
            .join("");
        })
        .catch(() => {
          document.getElementById("subtitle").textContent =
            "Subscription created successfully.";
        });
    } else {
      document.getElementById("subtitle").textContent =
        "Your subscription is now active.";
    }
  </script>
</body>
</html>
